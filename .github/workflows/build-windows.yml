name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # можно запустить вручную во вкладке Actions

permissions:
  contents: write # чтобы публиковать .exe в Releases

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer + portable
        run: npm run dist:win

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iphone-proxy-windows
          path: |
            dist/*.exe

      # При пуше тега vX.Y.Z — публикуем готовые .exe в Releases,
      # чтобы друг мог просто скачать.
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
